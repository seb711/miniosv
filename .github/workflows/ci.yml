name: CI

# Build the slim OSv kernel and run its in-kernel test suite for both
# architectures. Everything is driven from the top-level Makefile, which also
# auto-builds the pinned llvm-libc / libc++ / compiler-rt runtimes. The kernel
# boots via UEFI: the build wraps it into an EFI application (loader.efi) which
# QEMU launches under UEFI firmware (OVMF on x64, AAVMF on aarch64). x64 runs
# under KVM (the runner exposes /dev/kvm once permissions are opened up below);
# aarch64 is cross-emulated under TCG.

on:
  push:
    branches: [ master ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: ${{ matrix.arch }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            run_arch: x86_64
            qemu_pkg: qemu-system-x86
            fw_pkg: ovmf
            cross_pkgs: ""
          - arch: aarch64
            run_arch: aarch64
            qemu_pkg: qemu-system-arm
            fw_pkg: qemu-efi-aarch64
            # No aarch64 GNU cross package: the toolchain is pure-LLVM. clang
            # cross-compiles by target triple (-nostdinc, its own libc/libc++/
            # compiler-rt archives) and ld.lld links the aarch64 ELF, so neither
            # the cross gcc nor cross binutils is needed. libc++'s atomic.cpp
            # still pulls the arch-neutral <linux/futex.h>/asm-generic/* for its
            # futex backend; those come from the host linux-libc-dev (installed
            # below) plus the asm/* forwarders scripts/build-libcxx.sh generates.
            cross_pkgs: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build python3 git ca-certificates wget gnupg lsb-release \
            binutils linux-libc-dev qemu-utils mtools gdisk \
            ${{ matrix.cross_pkgs }} ${{ matrix.qemu_pkg }} ${{ matrix.fw_pkg }}
          # clang 20: the runtimes are llvm-22 and must be built with a compiler
          # >= the source version. The runner ships clang 16/17/18 with the
          # default set to 19, registered at a higher update-alternatives
          # priority than we could rely on, so install clang 20 from apt.llvm.org
          # and make `clang`/`clang++` resolve to it by symlinking into
          # /usr/local/bin (which precedes /usr/bin on PATH). Fail fast if the
          # build would otherwise pick up the wrong clang.
          wget -qO /tmp/llvm.sh https://apt.llvm.org/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh 20
          sudo ln -sf /usr/bin/clang-20   /usr/local/bin/clang
          sudo ln -sf /usr/bin/clang++-20 /usr/local/bin/clang++
          sudo ln -sf /usr/bin/ld.lld-20  /usr/local/bin/ld.lld
          hash -r
          clang --version
          clang --version | grep -q "clang version 20" || { echo "::error::clang is not version 20"; exit 1; }

      # The native x64 job runs under QEMU/KVM. GitHub's ubuntu-24.04 runners
      # ship a /dev/kvm node but it isn't accessible to the runner user by
      # default, so QEMU aborts with "Could not access KVM kernel module:
      # Permission denied". Install a udev rule that makes the node world-RW
      # and re-trigger it. Not needed for aarch64 (foreign-arch == pure TCG).
      - name: Enable KVM access
        if: matrix.arch == 'x64'
        run: |
          set -eux
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # The pinned llvm-project sparse checkout and the per-arch libc++ /
      # llvm-libc / compiler-rt builds are slow but stable; cache them keyed on
      # the toolchain build scripts.
      - name: Cache LLVM runtime toolchain
        uses: actions/cache@v4
        with:
          path: |
            external/llvm-project
            build/libcxx
            build/llvm-libc
            build/compiler-rt
          key: llvm-${{ matrix.arch }}-${{ hashFiles('scripts/build-libcxx.sh', 'scripts/build-llvm-libc.sh', 'scripts/build-compiler-rt.sh') }}

      - name: Build test kernel
        run: |
          make app=tests arch=${{ matrix.arch }} -j"$(nproc)"
          # Also build the bootable GPT/ESP disk image the smoke test boots as
          # an NVMe disk (needs mtools + gdisk, installed above).
          make app=tests arch=${{ matrix.arch }} \
            build/release.${{ matrix.arch }}/loader.img

      - name: Dump toolchain build logs on failure
        if: failure()
        run: |
          for f in build/libcxx/${{ matrix.arch }}-build.log \
                   build/llvm-libc/${{ matrix.arch }}-build.log \
                   build/compiler-rt/${{ matrix.arch }}-build.log; do
            echo "===================== $f ====================="
            tail -120 "$f" 2>/dev/null || echo "(not present)"
          done

      - name: Run test suite under QEMU + UEFI
        run: |
          set -eux
          # Boot the real disk image (loader.img) as an NVMe disk under QEMU +
          # UEFI firmware (OVMF on x64, AAVMF on aarch64) and wait for the test
          # driver's success line. smoke-test.sh exits non-zero if that marker
          # never appears.
          scripts/smoke-test.sh ${{ matrix.arch }} \
            build/release.${{ matrix.arch }}/loader.img \
            900 "OSv test application: SUCCESS" 2>&1 | tee run.log
          # Fail on an explicit FAILURE marker (case-sensitive, so it won't match
          # the "failures: 0" summary lines) or any non-zero failure count.
          ! grep -qE "FAILURE|failures: [1-9]|[1-9][0-9]* failures" run.log

      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-log-${{ matrix.arch }}
          path: run.log
          if-no-files-found: ignore
